<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
function setStatus(message) {
    document.querySelector("#projectTable tbody").innerHTML =
        `<tr><td colspan="5">${message}</td></tr>`;
}

window.addEventListener("message", (event) => {

    if (!event.data) return;

    // Ignore browser/internal messages
    if (typeof event.data === "string") return;

    setStatus(
        "Message received: " +
        JSON.stringify(event.data).substring(0, 1000)
    );

});

window.addEventListener("load", () => {

    setStatus("Sending API request to /api4/projects...");

    window.parent.postMessage({
        type: "api-request",
        method: "GET",
        path: "/api4/projects"
    }, "*");

});
</script>

</body>
</html>
