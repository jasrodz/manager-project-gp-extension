<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
async function loadProjects() {

    try {

        // Ask Manager for extension context
        window.parent.postMessage({
            type: "manager:context:request"
        }, "*");

        window.addEventListener("message", async (event) => {

            const context = event.data;

            console.log("Manager Context:", context);

            if (!context.api) {
                document.querySelector("#projectTable tbody").innerHTML = `
                    <tr>
                        <td colspan="5">
                            Manager API context not found.
                        </td>
                    </tr>
                `;
                return;
            }

            // API endpoint from Manager
            const apiUrl = context.api.endpoint;

            // Access token from Manager
            const token = context.api.token;

            // Request project data
            const response = await fetch(
                apiUrl + "/api4/project-view?access_token=" + token
            );

            const data = await response.json();

            console.log(data);

            const tbody = document.querySelector("#projectTable tbody");

            tbody.innerHTML = `
                <tr>
                    <td colspan="5">
                        API connected successfully.
                    </td>
                </tr>
            `;

        });

    } catch (err) {

        console.error(err);

        document.querySelector("#projectTable tbody").innerHTML = `
            <tr>
                <td colspan="5">
                    Error loading project data.
                </td>
            </tr>
        `;
    }
}

loadProjects();
</script>

</body>
</html>
