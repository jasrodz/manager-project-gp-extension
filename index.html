<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
function setStatus(message) {
    document.querySelector("#projectTable tbody").innerHTML =
        `<tr><td colspan="5">${message}</td></tr>`;
}

async function postMessageWithResponse(message) {
    return new Promise((resolve) => {
        const requestId = crypto.randomUUID();

        function onMessage(event) {
            if (
                event.data?.type === message.type + "-response" &&
                event.data?.requestId === requestId
            ) {
                window.removeEventListener("message", onMessage);
                resolve(event.data.body);
            }
        }

        window.addEventListener("message", onMessage);

        window.parent.postMessage({
            ...message,
            requestId
        }, "*");
    });
}

async function loadProjects() {
    setStatus("Requesting project data...");

    const result = await postMessageWithResponse({
        type: "api-request",
        method: "GET",
        path: "/api4/project"
    });

    setStatus("API result: " + JSON.stringify(result).substring(0, 1000));
}

window.addEventListener("load", loadProjects);
</script>

</body>
</html>
