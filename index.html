<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
async function loadProjects() {

    try {

        const response = await fetch("https://2406-da1c-b79-8704-179c-f02e-855f-5c1c.ip.manager.cloud/api4/project-view");

        const data = await response.json();

        console.log(data);

        const tbody = document.querySelector("#projectTable tbody");

        tbody.innerHTML = "";

        if (!data.fields) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5">No project data returned.</td>
                </tr>
            `;
            return;
        }

        data.fields.forEach(project => {

            const income = parseFloat(project.income || 0);
            const expenses = parseFloat(project.expenses || 0);
            const profit = parseFloat(project.profit || 0);

            let gp = 0;

            if (income > 0) {
                gp = ((profit / income) * 100).toFixed(2);
            }

            const row = `
                <tr>
                    <td>${project.label || ""}</td>
                    <td>$${income.toFixed(2)}</td>
                    <td>$${expenses.toFixed(2)}</td>
                    <td class="${profit >= 0 ? 'positive' : 'negative'}">
                        $${profit.toFixed(2)}
                    </td>
                    <td class="${gp >= 0 ? 'positive' : 'negative'}">
                        ${gp}%
                    </td>
                </tr>
            `;

            tbody.innerHTML += row;

        });

    } catch (err) {

        console.error(err);

        document.querySelector("#projectTable tbody").innerHTML = `
            <tr>
                <td colspan="5">
                    Error loading project data.
                </td>
            </tr>
        `;
    }
}

loadProjects();
</script>

</body>
</html>
