<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
function setStatus(message) {
    document.querySelector("#projectTable tbody").innerHTML =
        `<tr><td colspan="5">${message}</td></tr>`;
}

window.addEventListener("message", async (event) => {
    if (!event.data) return;

    if (event.data.type === "page-response") {
        setStatus("Page context received. Requesting API token...");

        window.parent.postMessage({
            type: "api-request",
            body: {
                method: "GET",
                path: "/api4/project-view"
            }
        }, "*");
    }

    if (event.data.type === "api-response") {
        setStatus("API response received: " + JSON.stringify(event.data.body).substring(0, 500));
    }

    if (event.data.type === "api-error") {
        setStatus("API error: " + JSON.stringify(event.data.body));
    }
});

window.addEventListener("load", () => {
    setStatus("Requesting page context...");
    window.parent.postMessage({ type: "page-request" }, "*");
});
</script>

</body>
</html>
