<!DOCTYPE html>
<html>
<head>
    <title>Project GP%</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .positive {
            color: green;
            font-weight: bold;
        }

        .negative {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Project GP%</h2>

<table id="projectTable">
    <thead>
        <tr>
            <th>Project</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Profit</th>
            <th>GP %</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td colspan="5">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
function money(amount, currency) {
    return new Intl.NumberFormat("en-AU", {
        style: "currency",
        currency: currency || "AUD"
    }).format(amount || 0);
}

function gpPercent(profit, income) {
    if (!income || income === 0) return "N/A";
    return ((profit / income) * 100).toFixed(2) + "%";
}

function renderProjects(projects) {
    const tbody = document.querySelector("#projectTable tbody");
    tbody.innerHTML = "";

    projects.forEach(project => {
        const income = project.income?.value || 0;
        const expenses = project.expenses?.value || 0;
        const profit = project.revisedProfit?.value ?? project.profit?.value ?? 0;
        const currency = project.income?.currency || "AUD";

        const gp = gpPercent(profit, income);

        tbody.innerHTML += `
            <tr>
                <td>${project.name || ""}</td>
                <td>${money(income, currency)}</td>
                <td>${money(expenses, currency)}</td>
                <td class="${profit >= 0 ? "positive" : "negative"}">
                    ${money(profit, currency)}
                </td>
                <td class="${profit >= 0 ? "positive" : "negative"}">
                    ${gp}
                </td>
            </tr>
        `;
    });
}

function setStatus(message) {
    document.querySelector("#projectTable tbody").innerHTML =
        `<tr><td colspan="5">${message}</td></tr>`;
}

window.addEventListener("message", (event) => {
    if (!event.data) return;
    if (typeof event.data === "string") return;

    if (event.data.type === "api-response") {
        if (event.data.status !== 200) {
            setStatus("API error: " + JSON.stringify(event.data.body));
            return;
        }

        const projects = event.data.body.projects || [];
        renderProjects(projects);
    }
});

window.addEventListener("load", () => {
    setStatus("Loading project GP%...");

    window.parent.postMessage({
        type: "api-request",
        method: "GET",
        path: "/api2/projects"
    }, "*");
});
</script>
</body>
</html>
